# 本地或 EC2 上快速验证：docker compose up -d --build
# 首次请复制 backend/.env.example 为 backend/.env 并填写密钥与数据库

services:
  promanager:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    volumes:
      # 持久化 SQLite / 仓库镜像 / 上传数据（路径相对 compose 文件）
      - promanager_backend_data:/app/backend/data
    restart: unless-stopped

volumes:
  promanager_backend_data:
